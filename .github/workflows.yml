name: Supabase 鏁版嵁澶囦唤

on:
  schedule:
    # 姣忓ぉ鍖椾含鏃堕棿 02:00 (UTC+8 鈫?UTC 18:00)
    - cron: "0 18 * * *"
  # 涔熸敮鎸佹墜鍔ㄨЕ鍙?  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 鍏佽鎻愪氦澶囦唤鍒颁粨搴?
    steps:
      - name: 妫€鍑轰粨搴?        uses: actions/checkout@v4

      - name: 鎵ц澶囦唤
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/backup.js

      - name: 鎻愪氦澶囦唤
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --cached --quiet; then
            echo "娌℃湁鏂版暟鎹紝璺宠繃鎻愪氦"
          else
            git commit -m "backup: $(date +%Y-%m-%d) 鑷姩澶囦唤"
            git push
            echo "鉁?澶囦唤宸叉帹閫佸埌浠撳簱"
          fi
